<h2>Technicians</h2>

<div>
  <input [(ngModel)]="form.fullName" placeholder="Full Name" />
  <input [(ngModel)]="form.phone" placeholder="Phone" />
  <input [(ngModel)]="form.specialty" placeholder="Specialty" />

  <button (click)="save()">Save</button>
  <button (click)="clear()">Clear</button>
</div>

<div *ngIf="loading">
  Loading...
</div>

<table *ngIf="!loading">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Specialty</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let t of technicians">
      <td>{{ t.id }}</td>
      <td>{{ t.fullName }}</td>
      <td>{{ t.phone }}</td>
      <td>{{ t.specialty }}</td>
      <td>
        <button (click)="edit(t)">Edit</button>
        <button (click)="delete(t.id)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>
