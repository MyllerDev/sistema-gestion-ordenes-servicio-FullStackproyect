<div style="width:300px;margin:100px auto;text-align:center">

  <h2>Login</h2>

  <input
    placeholder="Usuario"
    [(ngModel)]="username"
  />

  <br><br>

  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password"
  />

  <br><br>

  <button (click)="login()">
    Ingresar
  </button>

  <p style="color:red" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

</div>
