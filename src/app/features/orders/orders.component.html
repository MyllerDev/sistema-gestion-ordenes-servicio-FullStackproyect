<h2>Orders</h2>

<div>
  <select [(ngModel)]="filters.status">
    <option value="">Status</option>
    <option value="Pending">Pending</option>
    <option value="InProgress">In Progress</option>
    <option value="Finished">Finished</option>
  </select>

  <input [(ngModel)]="filters.client" placeholder="Client" />
  <input [(ngModel)]="filters.technician" placeholder="Technician" />

  <input type="date" [(ngModel)]="filters.fromDate" />
  <input type="date" [(ngModel)]="filters.toDate" />

  <button (click)="applyFilters()">Filter</button>
  <button (click)="clearFilters()">Clear</button>
</div>

<div *ngIf="loading">
  Loading...
</div>

<table *ngIf="!loading">
  <thead>
    <tr>
      <th>ID</th>
      <th>Date</th>
      <th>Status</th>
      <th>Description</th>
      <th>Client</th>
      <th>Technician</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let order of orders">
      <td>{{ order.id }}</td>
      <td>{{ order.createdAt }}</td>
      <td>{{ order.status }}</td>
      <td>{{ order.description }}</td>
      <td>{{ order.clientName }}</td>
      <td>{{ order.technicianName }}</td>
    </tr>
  </tbody>
</table>
